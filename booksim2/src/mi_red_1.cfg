// Topología: Malla 1D (Línea) de 8 Nodos (GPUs 0 a 7)
topology = mesh;
k = 8;
n = 1;

// Algoritmo de enrutamiento (Corregido)
routing_function = dim_order;

// Control de Flujo y Buffers
num_vcs = 4;
vc_buf_size = 8;

// Desactivamos el tráfico interno
traffic = uniform;
injection_rate = 0.0; 

// --- Ajustes de tiempo para el TFM ---
sim_type = latency;
sample_period = 100000; 
max_samples = 100;
warmup_periods = 0;

// --- Evitar que aborte por alta latencia ---
latency_thres = 100000000.0;
warmup_thres = 100000000.0;
stopping_thres = 100000000.0;
