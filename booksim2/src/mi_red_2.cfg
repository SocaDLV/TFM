// Topología: Malla 2D de 4x2 (8 Nodos en total)
topology = mesh;
k = 4;
n = 2;

// Algoritmo de enrutamiento adaptativo (busca caminos libres)
routing_function = min_adapt;

// Aumentamos los Buffers masivamente para tráfico de IA
num_vcs = 8;
vc_buf_size = 64; 

// Desactivamos el tráfico interno
traffic = uniform;
injection_rate = 0.0; 

// --- Ajustes de tiempo para el TFM ---
sim_type = latency;
sample_period = 100000; 
max_samples = 100;
warmup_periods = 0;

// --- Evitar que aborte por alta latencia ---
latency_thres = 100000000.0;
warmup_thres = 100000000.0;
stopping_thres = 100000000.0;
